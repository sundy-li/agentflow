database:
  path: data/agentflow.db

scheduler:
  enabled: true
  poll_interval_seconds: 60
  max_parallel_tasks: 4
  review_latency_hours: 0

codex:
  command: codex
  args: []
  timeout_seconds: 1800

ui:
  refresh_seconds: 5

run_logs_dir: data/runs

repos:
  - name: demo
    full_name: sundy-li/agentflow
    forked: your-github-user/agentflow
    workspace: /absolute/path/to/your/worktree
    default_branch: main
    enabled: true
